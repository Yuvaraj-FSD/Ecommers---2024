<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login / Sign Up</title>
  <link rel="stylesheet" href="./auth.css"/>
</head>
<body>
  <div class="auth-container" id="auth-container">
    
    <!-- Login Form (Default) -->
    <form class="auth-form" id="login-form" autocomplete="off">
      <h2>Login</h2>

      <div class="input-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="Enter your email" required autocomplete="username"/>
        <span class="error-msg" id="login-email-error"></span>
      </div>

      <div class="input-group">
        <label for="login-password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="login-password" placeholder="Enter your password" required autocomplete="current-password"/>
          <button type="button" class="show-hide" tabindex="-1" id="toggle-login-pw">&#128065;</button>
        </div>
        <span class="error-msg" id="login-password-error"></span>
      </div>

      <button type="submit" class="primary-btn">Login</button>

      <div class="switch-auth">
        <span>Don't have an account?</span>
        <a href="#" id="to-signup">Sign Up</a>

        <br><br>
        <span>Continue without account?</span>
        <a href="./index.html" id="guest-login-link">Continue as Guest</a>
      </div>
    </form>

    <!-- Sign Up Form -->
    <form class="auth-form" id="signup-form" style="display: none;" autocomplete="off">
      <h2>Sign Up</h2>

      <div class="input-group">
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" placeholder="Enter your email" required autocomplete="username"/>
        <span class="error-msg" id="signup-email-error"></span>
      </div>

      <div class="input-group">
        <label for="signup-password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="signup-password" placeholder="Create a password" required autocomplete="new-password"/>
          <button type="button" class="show-hide" tabindex="-1" id="toggle-signup-pw">&#128065;</button>
        </div>
        <span class="error-msg" id="signup-password-error"></span>
      </div>

      <div class="input-group">
        <label for="signup-confirm">Confirm Password</label>
        <div class="password-wrapper">
          <input type="password" id="signup-confirm" placeholder="Confirm your password" required autocomplete="new-password"/>
          <button type="button" class="show-hide" tabindex="-1" id="toggle-signup-cpw">&#128065;</button>
        </div>
        <span class="error-msg" id="signup-confirm-error"></span>
      </div>

      <button type="submit" class="primary-btn">Sign Up</button>

      <div class="switch-auth">
        <span>Already have an account?</span>
        <a href="#" id="to-login-from-signup">Login</a>

        <br><br>
        <span>Continue without account?</span>
        <a href="./index.html" id="guest-signup-link">Continue as Guest</a>
      </div>
    </form>
    
  </div>

  <script src="./auth.js"></script>

  <script>
    // Handle Guest Login
    document.getElementById("guest-login-link").addEventListener("click", () => {
      alert("Continuing as Guest. No account required.");
      // Redirect or handle guest login logic here
    });
    document.getElementById("guest-signup-link").addEventListener("click", () => {
      alert("Continuing as Guest. No account required.");
      // Redirect or handle guest login logic here
    });

    // Form Submission Handlers
    document.getElementById("login-form").addEventListener("submit", (e) => {
      e.preventDefault();
      // Handle login logic here
      alert("Login submitted");
    });
    
    document.getElementById("signup-form").addEventListener("submit", (e) => {
      e.preventDefault();
      // Handle signup logic here
      alert("Sign Up submitted");
    });
  document.getElementById("to-signup").addEventListener("click", () => {
    document.getElementById("login-form").style.display = "none";
    document.getElementById("signup-form").style.display = "block";
  });
  document.querySelectorAll("#to-login, #to-login-from-signup, #to-login-guest").forEach(btn => {
    btn.addEventListener("click", () => {
      document.getElementById("signup-form").style.display = "none";
      document.getElementById("login-form").style.display = "block";
    });
  });
  
  // Toggle Password Visibility
  ["toggle-login-pw", "toggle-signup-pw", "toggle-signup-cpw"].forEach(id => {
    const btn = document.getElementById(id);
    const input = btn.previousElementSibling;
    btn.addEventListener("click", () => {
      input.type = input.type === "password" ? "text" : "password";
    });
  });
  </script>

</body>
</html>
